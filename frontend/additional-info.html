<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Additional Information</title>
    <link rel="stylesheet" href="css/form.css">
    <script defer src="js/additional-info.js"></script>
</head>

<body>
    <div class="container">
        <h2>Additional Information Required</h2>

        <form id="manualForm">
            <label>Prior Living Children *</label>
            <input type="number" name="prior_living_children" required min="0">

            <label>Prenatal Visits *</label>
            <select name="prenatal_visits" required>
                <option value="">Choose…</option>
                <option value="0">0 visits</option>
                <option value="1">1–2 visits</option>
                <option value="2">3–4 visits</option>
                <option value="3">5+ visits</option>
            </select>

            <label>Marital Status *</label>
            <select name="marital_status" required>
                <option value="">Choose…</option>
                <option value="1">Married</option>
                <option value="0">Unmarried</option>
            </select>

            <button type="submit" class="btn-submit">
                Save & Continue
            </button>
        </form>
    </div>
</body>

</html>
