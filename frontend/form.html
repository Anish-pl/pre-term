<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Preterm Birth Risk — Multi Step Form</title>
  <link rel="stylesheet" href="css/form.css">
  <script defer src="js/form.js"></script>



</head>

<body>

  <div class="container">

    <!-- Home button -->
    <a href="index.html" class="btn-home">Home</a>

    <h2>Preterm Birth Risk Prediction</h2>

    <div class="progressbar">
      <div class="progress">
        <div class="bar" id="progressBar"></div>
      </div>
      <div class="step active">1</div>
      <div class="step">2</div>
      <div class="step">3</div>
    </div>

    <form id="multiForm" novalidate>
      <!-- STEP 1 -->
      <div class="form-step active" data-step="0">
        <h3>Parental Information</h3>

        <label for="mother_age">Mother's Age *</label>
        <input id="mother_age" name="mother_age" type="number" required min="10" max="60" placeholder="e.g. 28">

        <div class="row">
          <!-- <div class="col">
            <label for="mother_race">Mother's Race *</label>
            <select id="mother_race" name="mother_race" required>
              <option value="">Choose…</option>
              <option>White</option><option>Black</option><option>AIAN</option><option>Asian</option><option>NHOPI</option><option>More than one</option>
            </select>
          </div> -->
          <div class="col">
            <label for="paternity">Paternity *</label>
            <select id="paternity" name="paternity" required>
              <option value="">Choose…</option>
              <option>Yes</option>
              <option>No</option>
              <option>Unknown</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label for="marital_status">Marital Status *</label>
            <select id="marital_status" name="marital_status" required>
              <option value="">Choose…</option>
              <option>Married</option>
              <option>Unmarried</option>
            </select>
          </div>
          <div class="col">
            <label for="mother_education">Mother's Education *</label>
            <select id="mother_education" name="mother_education" required>
              <option value="">Choose…</option>
              <option>8th grade or less</option>
              <option>9th-12th grade, no diploma</option>
              <option>High school graduate / GED</option>
              <option>Some college credit</option>
              <option>Associate degree</option>
              <option>Bachelor's degree</option>
              <option>Master's degree</option>
              <option>Doctorate / Professional degree</option>
            </select>
          </div>
        </div>

        <label for="father_age">Father's Age (optional)</label>
        <input id="father_age" name="father_age" type="number" min="10" max="80" placeholder="optional">
        <!-- 
        <label for="father_race">Father's Race (optional)</label>
        <select id="father_race" name="father_race">
          <option value="">Choose…</option>
          <option>White</option>
          <option>Black</option>
          <option>AIAN</option>
          <option>Asian</option>
          <option>NHOPI</option>
          <option>More than one</option>
        </select> -->

        <label for="father_education">Father's Education (optional)</label>
        <select id="father_education" name="father_education">
          <option value="">Choose…</option>
          <option>8th grade or less</option>
          <option>9th-12th grade, no diploma</option>
          <option>High school graduate / GED</option>
          <option>Some college credit</option>
          <option>Associate degree</option>
          <option>Bachelor's degree</option>
          <option>Master's degree</option>
          <option>Doctorate / Professional degree</option>
        </select>


        <div class="buttons">
          <div></div><!-- placeholder so Next floats right -->
          <button type="button" class="btn-next" data-action="next">Next →</button>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="form-step" data-step="1">
        <h3>Reproductive & Prenatal History</h3>

        <label for="prior_living_children">Prior Living Children *</label>
        <input id="prior_living_children" name="prior_living_children" type="number" required min="0" value="0">

        <div class="row">
          <div class="col">
            <label for="prior_deceased_children">Prior Deceased Children</label>
            <input id="prior_deceased_children" name="prior_deceased_children" type="number" min="0"
              placeholder="optional">
          </div>
          <div class="col">
            <label for="terminations">Previous Pregnancy Terminations</label>
            <input id="prior_terminations" name="prior_terminations" type="number" min="0">

          </div>
        </div>

        <label for="birth_order">Total Birth Order *</label>
        <input id="birth_order" name="birth_order" type="number" required min="1"
          placeholder="total births including current">
        <!-- Months Since Last Live Birth -->
        <label for="months_last_live_birth">Months Since Last Live Birth</label>
        <input id="months_last_live_birth" name="months_last_live_birth" type="number" min="0"
          placeholder="Enter 0 if first birth" title="Enter 0 if this is the first birth" />

        <!-- Months Since Last Other Pregnancy -->
        <label for="months_last_other_pregnancy">Months Since Last Other Pregnancy (optional)</label>
        <input id="months_last_other_pregnancy" name="months_last_other_pregnancy" type="number" min="0"
          placeholder="optional" />

        <!-- Months Since Last Pregnancy -->
        <label for="months_last_pregnancy">Months Since Last Pregnancy (optional)</label>
        <input id="months_last_pregnancy" name="months_last_pregnancy" type="number" min="0" placeholder="optional" />


        <label for="prenatal_month">Month Prenatal Care Began *</label>
        <select id="prenatal_month" name="prenatal_month" required>
          <option value="">Choose…</option>
          <option>1-3</option>
          <option>4-6</option>
          <option>7-end</option>
          <option>No care</option>
        </select>

        <label for="prenatal_visits">Number of Prenatal Visits *</label>
        <select id="prenatal_visits" name="prenatal_visits" required>
          <option value="">Choose…</option>
          <option>0 visits</option>
          <option>1-2 visits</option>
          <option>3-4 visits</option>
          <option>5-6 visits</option>
          <option>7-8 visits</option>
          <option>9-10 visits</option>
          <option>11-12 visits</option>
          <option>13-14 visits</option>
          <option>15-16 visits</option>
          <option>17-18 visits</option>
          <option>19 or more visits</option>
        </select>

        <div class="buttons">
          <button type="button" class="btn-prev" data-action="prev">← Previous</button>
          <button type="button" class="btn-next" data-action="next">Next →</button>
        </div>
      </div>

      <!-- STEP 3 -->
      <!-- STEP 3 -->
      <div class="form-step" data-step="2">
        <h3>Lifestyle, Medical, and Infection Risk Factors</h3>

        <!-- 1. Cigarettes Before Pregnancy -->
        <label for="cig_before">Cigarettes Before Pregnancy *</label>
        <select id="cig_before" name="cig_before" required>
          <option value="">Choose…</option>
          <option>0</option>
          <option>1-5</option>
          <option>6-10</option>
          <option>11-20</option>
          <option>21-40</option>
          <option>41+</option>
        </select>

        <!-- 2. Cigarettes - 1st Trimester -->
        <label for="cig_t1">Cigarettes 1st Trimester *</label>
        <select id="cig_t1" name="cig_t1" required>
          <option value="">Choose…</option>
          <option>0</option>
          <option>1-5</option>
          <option>6-10</option>
          <option>11-20</option>
          <option>21-40</option>
          <option>41+</option>
        </select>

        <!-- 3. Cigarettes - 2nd Trimester -->
        <label for="cig_t2">Cigarettes 2nd Trimester</label>
        <select id="cig_t2" name="cig_t2">
          <option value="">Optional…</option>
          <option>0</option>
          <option>1-5</option>
          <option>6-10</option>
          <option>11-20</option>
          <option>21-40</option>
          <option>41+</option>
        </select>

        <!-- 4. Cigarettes - 3rd Trimester -->
        <label for="cig_t3">Cigarettes 3rd Trimester</label>
        <select id="cig_t3" name="cig_t3">
          <option value="">Optional…</option>
          <option>0</option>
          <option>1-5</option>
          <option>6-10</option>
          <option>11-20</option>
          <option>21-40</option>
          <option>41+</option>
        </select>

        <!-- 5. Height -->
        <label for="height">Mother's Height (inches) *</label>
        <input id="height" name="height" type="number" required min="40" max="84" placeholder="e.g., 64">

        <!-- 6. BMI -->
        <label for="bmi">Body Mass Index (BMI)</label>
        <input id="bmi" name="bmi" type="number" step="0.1" placeholder="auto or optional">

        <!-- 7. Weight Gain -->
        <label for="weight_gain">Weight Gain (lbs) *</label>
        <input id="weight_gain" name="weight_gain" type="number" required min="0">

        <!-- 8. Pre-pregnancy Diabetes -->
        <label for="pre_diabetes">Pre-pregnancy Diabetes *</label>
        <select id="pre_diabetes" name="pre_diabetes" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 9. Gestational Diabetes -->
        <label for="gest_diabetes">Gestational Diabetes *</label>
        <select id="gest_diabetes" name="gest_diabetes" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 10. Pre-pregnancy Hypertension -->
        <label for="pre_hyper">Pre-pregnancy Hypertension *</label>
        <select id="pre_hyper" name="pre_hyper" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 11. Gestational Hypertension -->
        <label for="gest_hyper">Gestational Hypertension *</label>
        <select id="gest_hyper" name="gest_hyper" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 12. Eclampsia -->
        <label for="eclampsia">Eclampsia *</label>
        <select id="eclampsia" name="eclampsia" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 13. Previous Preterm Birth -->
        <label for="prev_preterm">Previous Preterm Birth *</label>
        <select id="prev_preterm" name="prev_preterm" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 14. Infertility Treatment -->
        <label for="infertility_treat">Infertility Treatment Used</label>
        <select id="infertility_treat" name="infertility_treat">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 15. Fertility Enhancing Drugs -->
        <label for="fertility_drugs">Fertility Enhancing Drugs</label>
        <select id="fertility_drugs" name="fertility_drugs">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
          <option>Not Applicable</option>
        </select>

        <!-- 16. ART -->
        <label for="art">Assisted Reproductive Technology</label>
        <select id="art" name="art">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
          <option>Not Applicable</option>
        </select>

        <!-- 17. Previous Cesarean -->
        <label for="prev_csection">Previous Cesarean *</label>
        <select id="prev_csection" name="prev_csection" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 18. Number of Cesareans -->
        <label for="num_prev_csection">Number of Previous Cesareans</label>
        <input id="num_prev_csection" name="num_prev_csection" type="number" min="0"
          placeholder="Only if Previous Cesarean = Yes">

        <!-- 19. Gonorrhea -->
        <label for="gonorrhea">Gonorrhea</label>
        <select id="gonorrhea" name="gonorrhea">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 20. Syphilis -->
        <label for="syphilis">Syphilis</label>
        <select id="syphilis" name="syphilis">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 21. Chlamydia -->
        <label for="chlamydia">Chlamydia</label>
        <select id="chlamydia" name="chlamydia">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 22. Hepatitis B -->
        <label for="hep_b">Hepatitis B</label>
        <select id="hep_b" name="hep_b">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 23. Hepatitis C -->
        <label for="hep_c">Hepatitis C</label>
        <select id="hep_c" name="hep_c">
          <option value="">Optional…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <!-- 24. Plural Birth -->
        <label for="plural_birth">Plural Birth *</label>
        <select id="plural_birth" name="plural_birth" required>
          <option value="">Choose…</option>
          <option>Yes</option>
          <option>No</option>
        </select>

        <div class="buttons">
          <button type="button" class="btn-prev" data-action="prev">← Previous</button>
          <button type="submit" class="btn-submit">Submit</button>
        </div>
      </div>



      <div id="loading">Processing prediction… please wait.</div>
      <div id="result"></div>
  </div>
</body>


</body>

</html>
