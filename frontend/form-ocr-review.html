<!DOCTYPE html>
<html>

<head>
    <title>Review Extracted Report</title>
    <link rel="stylesheet" href="css/form.css">
    <script defer src="js/ocr-review.js"></script>
</head>

<body>

    <h2>Medical Report Review</h2>

    <h3>Extracted from Report</h3>
    <div id="ocrFeatures"></div>

    <h3>Additional Information Required</h3>

    <form id="manualForm">

        <label>Prior Living Children</label>
        <input type="number" name="prior_living_children" required min="0">

        <label>Prenatal Visits</label>
        <select name="prenatal_visits" required>
            <option value="">Choose…</option>
            <option value="0">0</option>
            <option value="1">1–2</option>
            <option value="2">3–4</option>
            <option value="3">5+</option>
        </select>

        <label>Marital Status</label>
        <select name="marital_status" required>
            <option value="">Choose…</option>
            <option value="1">Married</option>
            <option value="0">Unmarried</option>
        </select>

        <button type="submit">Predict Risk</button>
    </form>

</body>

</html>
