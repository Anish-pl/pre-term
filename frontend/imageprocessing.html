<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Upload Medical Report</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/imageprocess.css">
</head>

<body>

  <header class="header">
    <h1 class="logo">Birth Risk Predictor</h1>
  </header>

  <main class="main">
    <section class="upload-card">
      <h2>Upload Medical Report</h2>
      <p>Please upload your pregnancy medical report image.</p>

      <form id="imageForm">
        <input type="file" id="imageInput" accept="image/*" required />
        <button type="submit">Extract Report Data</button>
      </form>

      <div id="loader" style="display:none;">
        ⏳ Extracting report data...
      </div>
    </section>
  </main>

  <script src="js/imageprocess.js"></script>
</body>

</html>
